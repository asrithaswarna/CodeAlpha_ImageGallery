<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <header id="header">
        <h1>📷 <span>Visual</span>Verse</h1>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <nav class="navbar" aria-label="Main navigation">
            <ul id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="categories.html" class="active">Categories</a></li>

        </nav>
    </header>

    <div class="page-title">
        <h2 id="categoryTitle">🏖️ Beaches</h2>

    <!-- ═══ LIGHTBOX ═══ -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <button class="lightbox-nav prev" id="lightboxPrev">‹</button>
            <button class="lightbox-nav next" id="lightboxNext">›</button>
            <img src="" alt="Lightbox" id="lightboxImg" />
            <div class="lightbox-info">
                <h3 id="lightboxTitle">Image Title</h3>
                <p id="lightboxCategory">Category</p>
                <p class="exif" id="lightboxExif">📍 Location • 📷 Camera • 📅 Date</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
